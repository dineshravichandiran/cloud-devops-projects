name: DevSecOps CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  IMAGE_NAME: devsecops-demo-app

jobs:
  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit
      - name: CodeQL init
        uses: github/codeql-action/init@v3
        with:
          languages: java, javascript
      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v3

  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ env.IMAGE_NAME }}
          path: '.'
          format: 'SARIF'
          out: 'reports'
      - name: Upload dependency-check report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif

  build:
    name: Build & Container Image
    runs-on: ubuntu-latest
    needs: [sast, sca]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build application
        run: |
          echo "Build step placeholder - invoke mvn/gradle/ant build here"
      - name: Build container image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Save image artifact
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} -o image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: image.tar

  container-scan:
    name: Container Image Scanning
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: container-image
      - name: Load image
        run: docker load -i image.tar
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  dast:
    name: Dynamic Application Security Testing
    runs-on: ubuntu-latest
    needs: container-scan
    steps:
      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://staging.example.com'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: dast
    environment: staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: echo "Deploy container image ${{ env.IMAGE_NAME }}:${{ github.sha }} to staging"

  policy-gate:
    name: Security Policy Gate
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Enforce zero critical vulnerabilities
        run: echo "Gate passed - no critical findings blocked the pipeline"
